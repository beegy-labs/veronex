apiVersion: v1
kind: Service
metadata:
  name: {{ include "inferq.fullname" . }}-web
  labels:
    {{- include "inferq.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.inferqWeb.service.type }}
  selector:
    {{- include "inferq.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: {{ .Values.inferqWeb.service.port }}
      targetPort: http
      protocol: TCP
