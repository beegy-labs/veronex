{{- if .Values.otelCollector.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "inferq.fullname" . }}-otel-collector
  labels:
    {{- include "inferq.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
spec:
  type: {{ .Values.otelCollector.service.type }}
  selector:
    {{- include "inferq.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
  ports:
    - name: otlp-grpc
      port: {{ .Values.otelCollector.service.grpcPort }}
      targetPort: otlp-grpc
      protocol: TCP
    - name: otlp-http
      port: {{ .Values.otelCollector.service.httpPort }}
      targetPort: otlp-http
      protocol: TCP
    - name: health
      port: {{ .Values.otelCollector.service.healthPort }}
      targetPort: health
      protocol: TCP
{{- end }}
