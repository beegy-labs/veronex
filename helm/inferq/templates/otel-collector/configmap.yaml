{{- if .Values.otelCollector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "inferq.fullname" . }}-otel-collector
  labels:
    {{- include "inferq.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      # Scrape node-exporter instances deployed alongside Ollama servers.
      # Targets are fetched dynamically from inferq via Prometheus HTTP SD.
      # Register node-exporter URLs in the inferq admin → Backends page.
      prometheus:
        config:
          scrape_configs:
            - job_name: node-exporter
              scrape_interval: 30s
              http_sd_configs:
                - url: http://{{ include "inferq.fullname" . }}:3000/v1/metrics/targets
                  refresh_interval: 30s

      # OTLP receiver for application traces (inferq service).
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1000

      memory_limiter:
        check_interval: 1s
        limit_mib: 256

    exporters:
      # ClickHouse exporter — primary write path for dashboard queries.
      # Auto-creates otel_metrics_*, otel_traces tables with OTLP-native schema.
      clickhouse:
        endpoint: tcp://{{ include "inferq.fullname" . }}-clickhouse:9000
        database: {{ .Values.clickhouse.auth.database }}
        username: {{ .Values.clickhouse.auth.username }}
        password: {{ .Values.clickhouse.auth.password }}
        metrics_table_name: otel_metrics
        traces_table_name: otel_traces
        logs_table_name: otel_logs
        ttl: 720h
        create_schema: true
        timeout: 10s
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

      # Kafka/Redpanda exporters — streaming buffer layer.
      # Fan-out alongside ClickHouse; enables stream processing and future scale.
      kafka/metrics:
        brokers: [{{ include "inferq.kafkaBrokers" . }}]
        topic: otel-metrics
        encoding: otlp_json
        timeout: 10s
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

      kafka/traces:
        brokers: [{{ include "inferq.kafkaBrokers" . }}]
        topic: otel-traces
        encoding: otlp_json
        timeout: 10s
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

      debug:
        verbosity: basic

    service:
      extensions: [health_check]
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [memory_limiter, batch]
          exporters: [clickhouse, kafka/metrics]
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [clickhouse, kafka/traces]
{{- end }}
