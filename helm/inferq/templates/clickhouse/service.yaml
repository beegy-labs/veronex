{{- if .Values.clickhouse.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "inferq.fullname" . }}-clickhouse
  labels:
    {{- include "inferq.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
spec:
  type: {{ .Values.clickhouse.service.type }}
  selector:
    {{- include "inferq.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
  ports:
    - name: http
      port: {{ .Values.clickhouse.service.httpPort }}
      targetPort: http
      protocol: TCP
    - name: native
      port: {{ .Values.clickhouse.service.nativePort }}
      targetPort: native
      protocol: TCP
{{- end }}
