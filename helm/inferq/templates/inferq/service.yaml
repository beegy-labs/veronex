apiVersion: v1
kind: Service
metadata:
  name: {{ include "inferq.fullname" . }}
  labels:
    {{- include "inferq.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.inferq.service.type }}
  selector:
    {{- include "inferq.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: {{ .Values.inferq.service.port }}
      targetPort: http
      protocol: TCP
