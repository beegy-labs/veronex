{{- if .Values.redpanda.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inferq.fullname" . }}-redpanda
  labels:
    {{- include "inferq.labels" . | nindent 4 }}
    app.kubernetes.io/component: redpanda
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "inferq.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redpanda
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "inferq.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redpanda
    spec:
      containers:
        - name: redpanda
          image: "{{ .Values.redpanda.image.repository }}:{{ .Values.redpanda.image.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command:
            - redpanda
            - start
            - --smp=1
            - --memory=512M
            - --overprovisioned
            - --kafka-addr=PLAINTEXT://0.0.0.0:9092
            - --advertise-kafka-addr=PLAINTEXT://{{ include "inferq.fullname" . }}-redpanda:9092
          ports:
            - name: kafka
              containerPort: 9092
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - rpk
                - cluster
                - info
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - rpk
                - cluster
                - info
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            {{- toYaml .Values.redpanda.resources | nindent 12 }}
{{- end }}
