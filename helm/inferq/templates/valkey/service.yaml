{{- if .Values.valkey.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "inferq.fullname" . }}-valkey
  labels:
    {{- include "inferq.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
spec:
  type: {{ .Values.valkey.service.type }}
  selector:
    {{- include "inferq.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
  ports:
    - name: redis
      port: {{ .Values.valkey.service.port }}
      targetPort: redis
      protocol: TCP
{{- end }}
