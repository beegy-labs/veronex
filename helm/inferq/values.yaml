# ── inferq Helm Values ────────────────────────────────────────────────────────

# Global image pull policy
imagePullPolicy: IfNotPresent

# ── inferq Rust backend ───────────────────────────────────────────────────────
inferq:
  image:
    repository: inferq
    tag: latest
  replicaCount: 1
  env:
    # These are overridden at runtime with in-cluster service URLs
    # when postgres/valkey/clickhouse are enabled.
    # Override here only if you are using external services.
    databaseUrl: ""          # auto-computed from postgres section if postgres.enabled
    valkeyUrl: ""            # auto-computed from valkey section if valkey.enabled
    clickhouseUrl: ""        # auto-computed from clickhouse section if clickhouse.enabled
    clickhouseUser: inferq
    clickhousePassword: inferq
    clickhouseDb: inferq
    clickhouseEnabled: "true"
    ollamaUrl: "http://host-gateway:11434"
    geminiApiKey: ""
    bootstrapApiKey: "inferq-bootstrap-admin-key"
    rustLog: "info"
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  # Mount /sys/class/drm for AMD GPU sysfs metrics (read-only).
  # On non-Linux hosts this path does not exist; set to false to skip.
  mountDrmSysfs: false
  service:
    type: ClusterIP
    port: 3000

# ── inferq-web Next.js frontend ───────────────────────────────────────────────
inferqWeb:
  image:
    repository: inferq-web
    tag: latest
  replicaCount: 1
  env:
    # nextPublicInferqApiUrl is the URL the browser uses to reach inferq.
    # In production this should be the ingress/LoadBalancer URL.
    # Default points to inferq ClusterIP (useful for port-forward workflows).
    nextPublicInferqApiUrl: "http://localhost:3000"
    nextPublicInferqAdminKey: "inferq-bootstrap-admin-key"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  service:
    type: ClusterIP
    port: 3002

# ── PostgreSQL ────────────────────────────────────────────────────────────────
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "17-alpine"
  auth:
    database: inferq
    username: inferq
    password: inferq
  storage:
    size: 10Gi
    storageClassName: ""   # leave empty to use cluster default
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  service:
    type: ClusterIP
    port: 5432

# ── Valkey (Redis-compatible) ─────────────────────────────────────────────────
valkey:
  enabled: true
  image:
    repository: valkey/valkey
    tag: "8-alpine"
  storage:
    size: 2Gi
    storageClassName: ""
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  service:
    type: ClusterIP
    port: 6379

# ── ClickHouse ────────────────────────────────────────────────────────────────
clickhouse:
  enabled: true
  image:
    repository: clickhouse/clickhouse-server
    tag: "latest"
  auth:
    database: inferq
    username: inferq
    password: inferq
  storage:
    size: 20Gi
    storageClassName: ""
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  service:
    type: ClusterIP
    httpPort: 8123
    nativePort: 9000

# ── Redpanda (Kafka-compatible) ───────────────────────────────────────────────
# Set enabled: false to skip Redpanda and point OTel Collector at an external
# Kafka cluster. In that case set externalBrokers to your broker list.
redpanda:
  enabled: true
  image:
    repository: docker.redpanda.com/redpandadata/redpanda
    tag: "v24.2.7"
  # Used when enabled=false — comma-separated broker addresses, e.g.:
  #   externalBrokers: "kafka-broker-1:9092,kafka-broker-2:9092"
  externalBrokers: ""
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  service:
    type: ClusterIP
    port: 9092

# ── OpenTelemetry Collector ───────────────────────────────────────────────────
# Set enabled: false if you already have an OTel Collector in your cluster.
# When disabled, add inferq's HTTP SD URL to your existing collector config
# (see NOTES.txt after helm install for the exact snippet).
otelCollector:
  enabled: true
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "latest"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  service:
    type: ClusterIP
    grpcPort: 4317
    httpPort: 4318
    healthPort: 13133
