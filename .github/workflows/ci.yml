name: CI API

on:
  push:
    branches: [develop, main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force rebuild even if image exists'
        required: false
        default: true
        type: boolean

env:
  REGISTRY: gitea.girok.dev
  IMAGE_NAME: beegy-labs/veronex

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build API
    runs-on: arc-runner-set
    timeout-minutes: 60
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      skipped: ${{ steps.check_image.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITEA_USERNAME }}
          password: ${{ secrets.GITEA_TOKEN }}

      - name: Meta
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          case "${{ github.ref_name }}" in
            main)    TAG="${SHORT_SHA}";         TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" ;;
            develop) TAG="develop-${SHORT_SHA}"; TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop" ;;
            *)       TAG="develop-${SHORT_SHA}"; TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}" ;;
          esac
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Check if image exists
        id: check_image
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          if [ "${{ inputs.force_build }}" = "true" ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Force build requested, skipping image check"
            exit 0
          fi
          TAG="${{ steps.meta.outputs.tag }}"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            "https://${{ env.REGISTRY }}/api/v1/packages/beegy-labs/container/veronex/${TAG}")
          if [ "$RESPONSE" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Image ${TAG} already exists, skipping build"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Image ${TAG} not found, proceeding with build"
          fi

      - uses: docker/build-push-action@v5
        if: steps.check_image.outputs.exists != 'true'
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
