name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force rebuild even if image exists'
        required: false
        default: true
        type: boolean

env:
  REGISTRY: gitea.girok.dev
  IMAGE_NAME: beegy-labs/veronex

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, kubernetes, gitops]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Rust fmt
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all
        env:
          SQLX_OFFLINE: "true"
          RUST_LOG: error

  check-web:
    name: Check Web
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, kubernetes, gitops]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Type check
        working-directory: web
        run: npx tsc --noEmit
      - name: Unit tests
        working-directory: web
        run: npm test
      - name: Build
        working-directory: web
        run: npm run build

  e2e-smoke-pr:
    name: E2E Smoke (PR)
    if: github.event_name == 'pull_request'
    needs: check-web
    runs-on: [self-hosted, kubernetes, gitops]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        working-directory: web
        run: npx playwright test --grep @smoke
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: ${{ vars.E2E_BASE_URL }}
          PLAYWRIGHT_API_URL: ${{ vars.E2E_API_URL }}
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr
          path: web/playwright-report/
          retention-days: 7

  build:
    name: Build
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && contains(fromJSON('["develop", "main"]'), github.ref_name)
    runs-on: [self-hosted, kubernetes, gitops]
    timeout-minutes: 60
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      skipped: ${{ steps.check_image.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITEA_USERNAME }}
          password: ${{ secrets.GITEA_TOKEN }}

      - name: Meta
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          case "${{ github.ref_name }}" in
            main)    TAG="${SHORT_SHA}";         TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" ;;
            develop) TAG="develop-${SHORT_SHA}"; TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop" ;;
            *)       TAG="develop-${SHORT_SHA}"; TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}" ;;
          esac
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Check if image exists
        id: check_image
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          if [ "${{ inputs.force_build }}" = "true" ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "🔨 Force build requested, skipping image check"
            exit 0
          fi
          TAG="${{ steps.meta.outputs.tag }}"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            "${{ env.REGISTRY }}/api/v1/packages/beegy-labs/container/veronex/${TAG}")
          if [ "$RESPONSE" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Image ${TAG} already exists, skipping build"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "🔨 Image ${TAG} not found, proceeding with build"
          fi

      - uses: docker/build-push-action@v5
        if: steps.check_image.outputs.exists != 'true'
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    name: Deploy
    if: always() && needs.build.result == 'success'
    needs: build
    runs-on: [self-hosted, kubernetes, gitops]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          repository: beegy-labs/platform-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Update & Push
        run: |
          cd gitops && git pull --rebase
          case "${{ github.ref_name }}" in
            main)    FILE="clusters/home/values/veronex-prod.yaml";    ENV="production" ;;
            develop) FILE="clusters/home/values/veronex-dev.yaml";     ENV="development" ;;
            *)       FILE="clusters/home/values/veronex-dev.yaml";     ENV="development" ;;
          esac
          awk -v newtag="${{ needs.build.outputs.tag }}" '
            /^image:/ { in_image=1 }
            in_image && /^[a-z]/ && !/^image:/ { in_image=0 }
            in_image && /tag:/ { sub(/tag: ".*"/, "tag: \"" newtag "\""); in_image=0 }
            { print }
          ' ${FILE} > ${FILE}.tmp && mv ${FILE}.tmp ${FILE}
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${FILE}
          git diff --staged --quiet || git commit -m "chore(${ENV}): update veronex to ${{ needs.build.outputs.tag }}"
          for i in 1 2 3; do git push && break || { sleep 3; git pull --rebase; }; done

      - name: Cleanup old images
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          case "${{ github.ref_name }}" in
            main)    P="" ;;
            develop) P="develop-" ;;
            *)       P="develop-" ;;
          esac
          curl -s -H "Authorization: token ${GITEA_TOKEN}" "https://gitea.girok.dev/api/v1/packages/beegy-labs/container/veronex" | \
            jq -r ".[] | select(.version | startswith(\"${P}\")) | \"\(.created_at)|\(.version)\"" | sort -r | tail -n +11 | \
            while IFS='|' read -r _ v; do curl -sX DELETE -H "Authorization: token ${GITEA_TOKEN}" "https://gitea.girok.dev/api/v1/packages/beegy-labs/container/veronex/${v}"; done

  e2e-smoke:
    name: E2E Smoke
    if: always() && needs.deploy.result == 'success'
    needs: deploy
    runs-on: [self-hosted, kubernetes, gitops]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Wait for rollout
        run: |
          case "${{ github.ref_name }}" in
            main)    NS="veronex-prod" ;;
            *)       NS="veronex-dev" ;;
          esac
          kubectl rollout status deployment/veronex -n ${NS} --timeout=120s || true

      - name: Run smoke tests
        working-directory: web
        run: npx playwright test --grep @smoke
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: ${{ vars.E2E_BASE_URL }}
          PLAYWRIGHT_API_URL: ${{ vars.E2E_API_URL }}
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
