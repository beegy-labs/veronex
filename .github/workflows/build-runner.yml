name: Build Runner Image

on:
  push:
    branches: [develop, main]
    paths:
      - '.github/runner/Dockerfile'
      - '.github/workflows/build-runner.yml'
  workflow_dispatch:

env:
  REGISTRY: gitea.girok.dev
  IMAGE: gitea.girok.dev/beegy-labs/veronex-runner

jobs:
  build:
    name: Build and push runner image
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITEA_USERNAME }}
          password: ${{ secrets.GITEA_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .github/runner
          file: .github/runner/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

  deploy:
    name: Update runner image tag in platform-gitops
    needs: build
    runs-on: arc-runner-set
    if: github.ref_name == 'develop' || github.ref_name == 'main'
    steps:
      - uses: actions/checkout@v4
        with:
          repository: beegy-labs/platform-gitops
          ref: develop
          token: ${{ secrets.GH_PAT }}

      - name: Update image tag
        run: |
          SHA="${{ github.sha }}"
          sed -i "s|gitea.girok.dev/beegy-labs/veronex-runner:.*|gitea.girok.dev/beegy-labs/veronex-runner:${SHA}|g" \
            platform/ci/veronex-runner/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add platform/ci/veronex-runner/values.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore(veronex-runner): update runner image tag to ${{ github.sha }}"
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase
          done
          exit 1

  cleanup:
    name: Cleanup old runner images
    needs: build
    uses: ./.github/workflows/cleanup-images.yml
    with:
      image_name: veronex-runner
      branch: ${{ github.ref_name }}
      keep: 5
    secrets:
      GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
