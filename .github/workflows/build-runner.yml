name: Build Runner Image

# This workflow only builds + pushes the runner OCI image. Pod rollout is
# NOT automated here: ARC (`arc-runner-set`) is provisioned by Terraform
# (`platform-gitops/bootstrap/terraform/modules/arc-controller/`), not
# ArgoCD, to avoid a circular dependency. To roll a freshly-built image
# to runner pods, update `arc_runner_image` in
# `platform-gitops/bootstrap/terraform/variables.tf` (or pass
# `TF_VAR_arc_runner_image=…`) and `terraform apply` the bootstrap module.
#
# The previous `deploy` job sed-edited `platform/ci/{rust,veronex}-runner/
# values.yaml` in `platform-gitops` and relied on ArgoCD auto-sync, but
# that chart was retired in `platform-gitops@d622b0e2` ("drop
# platform-rust-runners scale set, single arc-runner-set"); the GitOps
# update step has had no live target since then and was removed here.

on:
  push:
    branches: [develop, main]
    paths:
      - '.github/runner/Dockerfile'
      - '.github/workflows/build-runner.yml'
  workflow_dispatch:

env:
  REGISTRY: gitea.girok.dev
  IMAGE: gitea.girok.dev/beegy-labs/veronex-runner

jobs:
  build:
    name: Build and push runner image
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITEA_USERNAME }}
          password: ${{ secrets.GITEA_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .github/runner
          file: .github/runner/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

  cleanup:
    name: Cleanup old runner images
    needs: build
    uses: ./.github/workflows/cleanup-images.yml
    with:
      image_name: veronex-runner
      branch: ${{ github.ref_name }}
      keep: 5
    secrets:
      GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
