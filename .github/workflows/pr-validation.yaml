name: PR Validation

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  validate:
    name: Validate PR
    runs-on: arc-runner-set
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check target branch
        run: |
          echo "Validating PR target branch..."
          BASE="${{ github.base_ref }}"
          if [ "$BASE" != "develop" ] && [ "$BASE" != "main" ]; then
            echo "❌ ERROR: PRs must target 'develop' or 'main', not '${BASE}'"
            exit 1
          fi
          if [ "$BASE" = "main" ]; then
            HEAD="${{ github.head_ref }}"
            if [ "$HEAD" != "develop" ]; then
              echo "❌ ERROR: Only 'develop' branch can merge into 'main', not '${HEAD}'"
              exit 1
            fi
          fi
          echo "✅ Target branch is correct: ${BASE}"

      - name: Validate commit messages
        if: github.base_ref != 'main'
        run: |
          echo "Validating commit message format..."

          git log --format="%H %s" origin/${{ github.base_ref }}..HEAD | while read hash message; do
            echo "Checking commit: $hash"
            echo "  Message: $message"

            if echo "$message" | grep -qE '^Merge [0-9a-f]{40} into [0-9a-f]{40}|^Merge pull request #[0-9]+ from '; then
              echo "  ⏭️  Skipping merge commit"
              continue
            fi

            if ! echo "$message" | grep -qE '^(feat|fix|chore|docs|refactor|test|perf|ci|build|revert|style)\([a-z0-9-]+\): .+'; then
              echo "❌ ERROR: Invalid commit message format"
              echo "  Expected: type(scope): description"
              echo "  Got: $message"
              echo ""
              echo "Valid types: feat, fix, chore, docs, refactor, test, perf, ci, build, revert, style"
              echo "Example: feat(auth): add user authentication"
              exit 1
            fi

            echo "  ✅ Format is valid"
          done

          echo "✅ All commit messages are valid"

      - name: Scan for secrets
        run: |
          echo "Scanning for potential secrets in changed lines..."

          DIFF_CONTENT=$(git diff origin/${{ github.base_ref }}..HEAD | grep '^+' | grep -v '^+++' || true)

          if [ -z "$DIFF_CONTENT" ]; then
            echo "No added lines to scan"
            exit 0
          fi

          SECRET_PATTERNS=(
            'password\s*=\s*["\047][^"\047<>]{8,}'
            'api[_-]?key\s*=\s*["\047][^"\047<>]{16,}'
            'secret[_-]?key\s*=\s*["\047][^"\047<>]{16,}'
            'token\s*=\s*["\047](ghp_|github_pat_)[a-zA-Z0-9]{36,}'
            'aws_access_key_id\s*=\s*["\047]AK[A-Z0-9]{16,}'
            'private[_-]?key\s*=\s*["\047]-----BEGIN'
          )

          EXCLUDE_PATTERNS='(existingSecret|secretKeyRef|secretStoreRef|<[A-Z_]+>|<YOUR_|<SECRET|REDACTED|example\.com|encrypt|decrypt|master_key|encryption_key|\$\{)'

          FOUND_SECRETS=0

          for pattern in "${SECRET_PATTERNS[@]}"; do
            MATCHES=$(echo "$DIFF_CONTENT" | grep -iE "$pattern" || true)
            if [ -n "$MATCHES" ]; then
              REAL_MATCHES=$(echo "$MATCHES" | grep -vE "$EXCLUDE_PATTERNS" || true)
              if [ -n "$REAL_MATCHES" ]; then
                echo "⚠️  Potential secret found:"
                echo "$REAL_MATCHES"
                FOUND_SECRETS=1
              fi
            fi
          done

          if [ $FOUND_SECRETS -eq 1 ]; then
            echo ""
            echo "❌ ERROR: Potential secrets detected in changed lines"
            echo "Please review and remove any hardcoded secrets"
            exit 1
          fi

          echo "✅ No secrets detected"

  changes:
    name: Detect Changes
    runs-on: arc-runner-set
    timeout-minutes: 5
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            web:
              - 'web/**'

  test-api:
    name: Test API
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: arc-runner-set
    # Runs directly on the arc-runner pod (no `container:`). The pre-baked
    # Rust image (`vars.VERONEX_RUNNER_IMAGE`) was unusable as a container
    # because it lacked Node.js — `actions/checkout@v4` could not exec
    # `/__e/node20/bin/node`. The Dockerfile now installs Node.js (see
    # `.github/runner/Dockerfile`); once the image is rebuilt and the repo
    # var is bumped, this job can move back to `container:` form for
    # faster, cache-warm runs. Until then, set up Rust at step level.
    timeout-minutes: 30
    env:
      # sccache shares the in-cluster Garage S3 pool with ci-rust/ci-embed.
      # `RUSTC_WRAPPER=sccache` + `CARGO_INCREMENTAL=0` is the canonical 2026
      # combo for self-hosted runners; incremental compilation is incompatible
      # with sccache and ephemeral runners (see DeepWiki sccache docs +
      # xxchan blog "Stupidly effective ways to optimize Rust compile time").
      SCCACHE_BUCKET: sccache
      SCCACHE_ENDPOINT: ${{ secrets.SCCACHE_ENDPOINT }}
      SCCACHE_REGION: us-east-1
      SCCACHE_S3_USE_SSL: "true"
      SCCACHE_S3_KEY_PREFIX: veronex-test/
      AWS_ACCESS_KEY_ID: ${{ secrets.SCCACHE_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libcurl4-openssl-dev clang mold
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest
      - name: Install sccache
        run: |
          SCCACHE_VERSION=0.8.2
          curl -fsSL "https://github.com/mozilla/sccache/releases/download/v${SCCACHE_VERSION}/sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz -C /tmp
          sudo mv "/tmp/sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache" /usr/local/bin/
          sccache --version
      - uses: Swatinem/rust-cache@v2
        with:
          # sccache owns the compile-artifact cache via S3; double-caching
          # `target/` via the Action layer wastes restore time and disk.
          cache-targets: false
      - name: Cache GeoNames data
        uses: actions/cache@v4
        with:
          # `crates/veronex-mcp/build.rs` downloads cities1000.txt + admin1
          # from download.geonames.org. Persisting this dir between runs
          # eliminates ~9.7 MB egress + ~20 s wall time per build. Bump the
          # key suffix when GeoNames format/source changes.
          path: crates/veronex-mcp/data
          key: geonames-cities1000-v1
      - name: Run tests
        env:
          RUSTC_WRAPPER: sccache
          CARGO_INCREMENTAL: "0"
        run: |
          SQLX_OFFLINE=true RUST_LOG=error cargo nextest run --all
          sccache --show-stats

  test-web:
    name: Test Web
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: arc-runner-set
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci || npm install
      - name: Type check
        working-directory: web
        run: npx tsc --noEmit
      - name: Unit tests
        working-directory: web
        run: npx vitest run
