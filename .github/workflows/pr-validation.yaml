name: PR Validation

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  validate:
    name: Validate PR
    runs-on: arc-runner-set
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check target branch
        run: |
          echo "Validating PR target branch..."
          BASE="${{ github.base_ref }}"
          if [ "$BASE" != "develop" ] && [ "$BASE" != "main" ]; then
            echo "❌ ERROR: PRs must target 'develop' or 'main', not '${BASE}'"
            exit 1
          fi
          if [ "$BASE" = "main" ]; then
            HEAD="${{ github.head_ref }}"
            if [ "$HEAD" != "develop" ]; then
              echo "❌ ERROR: Only 'develop' branch can merge into 'main', not '${HEAD}'"
              exit 1
            fi
          fi
          echo "✅ Target branch is correct: ${BASE}"

      - name: Validate commit messages
        if: github.base_ref != 'main'
        run: |
          echo "Validating commit message format..."

          git log --format="%H %s" origin/${{ github.base_ref }}..HEAD | while read hash message; do
            echo "Checking commit: $hash"
            echo "  Message: $message"

            if echo "$message" | grep -qE '^Merge [0-9a-f]{40} into [0-9a-f]{40}|^Merge pull request #[0-9]+ from '; then
              echo "  ⏭️  Skipping merge commit"
              continue
            fi

            if ! echo "$message" | grep -qE '^(feat|fix|chore|docs|refactor|test|perf|ci|build|revert|style)\([a-z0-9-]+\): .+'; then
              echo "❌ ERROR: Invalid commit message format"
              echo "  Expected: type(scope): description"
              echo "  Got: $message"
              echo ""
              echo "Valid types: feat, fix, chore, docs, refactor, test, perf, ci, build, revert, style"
              echo "Example: feat(auth): add user authentication"
              exit 1
            fi

            echo "  ✅ Format is valid"
          done

          echo "✅ All commit messages are valid"

      - name: Scan for secrets
        run: |
          echo "Scanning for potential secrets in changed lines..."

          DIFF_CONTENT=$(git diff origin/${{ github.base_ref }}..HEAD | grep '^+' | grep -v '^+++' || true)

          if [ -z "$DIFF_CONTENT" ]; then
            echo "No added lines to scan"
            exit 0
          fi

          SECRET_PATTERNS=(
            'password\s*=\s*["\047][^"\047<>]{8,}'
            'api[_-]?key\s*=\s*["\047][^"\047<>]{16,}'
            'secret[_-]?key\s*=\s*["\047][^"\047<>]{16,}'
            'token\s*=\s*["\047](ghp_|github_pat_)[a-zA-Z0-9]{36,}'
            'aws_access_key_id\s*=\s*["\047]AK[A-Z0-9]{16,}'
            'private[_-]?key\s*=\s*["\047]-----BEGIN'
          )

          EXCLUDE_PATTERNS='(existingSecret|secretKeyRef|secretStoreRef|<[A-Z_]+>|<YOUR_|<SECRET|REDACTED|example\.com|encrypt|decrypt|master_key|encryption_key|\$\{)'

          FOUND_SECRETS=0

          for pattern in "${SECRET_PATTERNS[@]}"; do
            MATCHES=$(echo "$DIFF_CONTENT" | grep -iE "$pattern" || true)
            if [ -n "$MATCHES" ]; then
              REAL_MATCHES=$(echo "$MATCHES" | grep -vE "$EXCLUDE_PATTERNS" || true)
              if [ -n "$REAL_MATCHES" ]; then
                echo "⚠️  Potential secret found:"
                echo "$REAL_MATCHES"
                FOUND_SECRETS=1
              fi
            fi
          done

          if [ $FOUND_SECRETS -eq 1 ]; then
            echo ""
            echo "❌ ERROR: Potential secrets detected in changed lines"
            echo "Please review and remove any hardcoded secrets"
            exit 1
          fi

          echo "✅ No secrets detected"

  changes:
    name: Detect Changes
    runs-on: arc-runner-set
    timeout-minutes: 5
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            web:
              - 'web/**'

  test-api:
    name: Test API
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: arc-runner-set
    # Rust toolchain is pre-baked in the veronex-runner image. Externalized
    # to a repo variable (vars.VERONEX_RUNNER_IMAGE) so image upgrades are a
    # one-line `gh variable set` instead of a code change. `env.*` is NOT
    # available in container.image (documented GHA limitation), so we use
    # `vars.*` which IS supported.
    container:
      image: ${{ vars.VERONEX_RUNNER_IMAGE }}
      options: --user 0:0
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        env:
          # PR tests use Swatinem/rust-cache (target/) — disable sccache
          # wrapper (not needed; also robust when image lacks binary).
          RUSTC_WRAPPER: ""
          CARGO_INCREMENTAL: "1"
        run: SQLX_OFFLINE=true RUST_LOG=error cargo nextest run --all

  test-web:
    name: Test Web
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: arc-runner-set
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci || npm install
      - name: Type check
        working-directory: web
        run: npx tsc --noEmit
      - name: Unit tests
        working-directory: web
        run: npx vitest run
