name: Update Policy Submodule

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: veronex-runner-set
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          ref: develop
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update submodule
        run: git submodule update --remote vendor/agentic-dev-protocol

      - name: Commit and push if changed
        run: |
          if ! git diff --quiet -- vendor/agentic-dev-protocol; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add vendor/agentic-dev-protocol
            git commit -m "chore(policy): update agentic-dev-protocol submodule"
            git push origin develop
          else
            echo "Submodule already up to date, skipping commit."
          fi
