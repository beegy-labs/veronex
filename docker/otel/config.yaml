extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  # OTLP receiver for metrics (veronex-agent), traces, and logs.
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 200
    send_batch_max_size: 256

  memory_limiter:
    check_interval: 1s
    limit_mib: 256

  # Filter: only forward metrics we care about to Kafka.
  # Agent pushes ALL node-exporter metrics raw — this is where we select.
  filter/metrics:
    metrics:
      include:
        match_type: regexp
        metric_names:
          # System
          - node_memory_MemTotal_bytes
          - node_memory_MemAvailable_bytes
          - node_cpu_seconds_total
          # GPU (DRM + hwmon)
          - node_drm_.*
          - node_hwmon_temp_celsius
          - node_hwmon_power_average_watt.*
          - node_hwmon_chip_names
          # Ollama
          - ollama_.*

exporters:
  # Kafka/Redpanda exporters — Redpanda is the single message bus.
  # ClickHouse consumes these topics via Kafka Engine → Materialized View.
  kafka/metrics:
    brokers: [redpanda:9092]
    topic: otel-metrics
    encoding: otlp_json
    timeout: 10s
    producer:
      compression: gzip
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  kafka/traces:
    brokers: [redpanda:9092]
    topic: otel-traces
    encoding: otlp_json
    timeout: 10s
    producer:
      compression: gzip
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  kafka/logs:
    brokers: [redpanda:9092]
    topic: otel-logs
    encoding: otlp_json
    timeout: 10s
    producer:
      compression: gzip
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  # Debug logging (disable in production).
  debug:
    verbosity: basic

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, filter/metrics, batch]
      exporters: [kafka/metrics]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [kafka/traces]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [kafka/logs]
