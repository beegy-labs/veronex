extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  # OTLP receiver for metrics (veronex-agent), traces, and logs.
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 200
    send_batch_max_size: 256

  memory_limiter:
    check_interval: 1s
    limit_mib: 256

exporters:
  # Kafka/Redpanda exporters — Redpanda is the single message bus.
  # veronex-consumer subscribes to all three topics and HTTP INSERTs into ClickHouse.
  kafka/metrics:
    brokers: [redpanda:9092]
    topic: otel.audit.metrics
    encoding: otlp_json
    timeout: 10s
    producer:
      compression: gzip
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  kafka/traces:
    brokers: [redpanda:9092]
    topic: otel.audit.traces
    encoding: otlp_json
    timeout: 10s
    producer:
      compression: gzip
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  kafka/logs:
    brokers: [redpanda:9092]
    topic: otel.audit.logs
    encoding: otlp_json
    timeout: 10s
    producer:
      compression: gzip
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  # Debug logging (disable in production).
  debug:
    verbosity: basic

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [kafka/metrics]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [kafka/traces]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [kafka/logs]
