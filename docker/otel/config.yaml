extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  # Scrape node-exporter instances deployed alongside Ollama servers.
  # Targets are fetched dynamically from inferq via Prometheus HTTP SD.
  # Register node-exporter URLs in the inferq admin → Backends page.
  prometheus:
    config:
      scrape_configs:
        - job_name: node-exporter
          scrape_interval: 30s
          http_sd_configs:
            - url: http://inferq:3000/v1/metrics/targets
              refresh_interval: 30s

  # OTLP receiver for application traces (inferq service).
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000

  memory_limiter:
    check_interval: 1s
    limit_mib: 256

exporters:
  # ClickHouse exporter — primary write path for dashboard queries.
  # Auto-creates otel_metrics_*, otel_traces tables with OTLP-native schema.
  clickhouse:
    endpoint: tcp://clickhouse:9000
    database: inferq
    username: inferq
    password: inferq
    metrics_table_name: otel_metrics
    traces_table_name: otel_traces
    logs_table_name: otel_logs
    ttl: 720h   # 30 days
    create_schema: true
    timeout: 10s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  # Kafka/Redpanda exporters — streaming buffer layer.
  # Fan-out alongside ClickHouse; enables stream processing and future scale.
  # Swap broker address to migrate to Kafka cluster (zero code changes).
  kafka/metrics:
    brokers: [redpanda:9092]
    topic: otel-metrics
    encoding: otlp_json
    timeout: 10s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  kafka/traces:
    brokers: [redpanda:9092]
    topic: otel-traces
    encoding: otlp_json
    timeout: 10s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  # Debug logging (disable in production).
  debug:
    verbosity: basic

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [prometheus]
      processors: [memory_limiter, batch]
      exporters: [clickhouse, kafka/metrics]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [clickhouse, kafka/traces]
