# ── App images ─────────────────────────────────────────────────────────────────

veronex:
  image:
    repository: gitea.girok.dev/beegy-labs/veronex
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1

  cors:
    allowedOrigins: "*"

  jwt:
    secret: ""  # REQUIRED — override via --set or values override file

  ollama:
    url: "http://ollama:11434"

  analytics:
    secret: ""  # REQUIRED — shared secret between veronex and veronex-analytics

  bootstrapSuperUser: ""
  bootstrapSuperPass: ""
  geminiApiKey: ""

  encryption:
    key: ""  # REQUIRED — AES-256-GCM key for provider API keys. Generate: openssl rand -hex 32

  # Capacity analyzer Ollama URL — defaults to OLLAMA_URL when unset
  capacityAnalyzerOllamaUrl: ""

  # Session grouping interval (seconds). Default: 86400 (24h)
  sessionGroupingIntervalSecs: ""

  # Public URL for image storage (MinIO/S3).
  # Used to construct URLs for job image thumbnails served to the browser.
  # e.g. "https://s3.example.com/veronex-images" or "http://localhost:9010/veronex-images"
  imagePublicUrl: ""

  # PostgreSQL connection pool max size. Default: 10
  pgPoolMax: ""

  # Valkey connection pool size. Default: 16
  valkeyPoolSize: ""

  # Valkey key prefix for deployment isolation on shared Valkey instances.
  # Default: "" (no prefix). Example: "prod:" → keys become "prod:veronex:..."
  valkeyKeyPrefix: ""

  # Login rate limit (max attempts per IP per 5-minute window). Default: 10. 0 = disabled.
  loginRateLimit: ""

  # Fallback model for vision inference when provider does not support images.
  # e.g. "llava:13b"
  visionFallbackModel: ""

  # MCP vector selector top-K results returned from Vespa ANN search. Default: 8
  mcpVectorTopK: ""

  # Vespa environment partition key — isolates documents per environment on a shared Vespa instance.
  # REQUIRED when multiple environments share a single Vespa — override per environment.
  # e.g. --set veronex.vespaEnvironment=prod
  vespaEnvironment: "prod"

  # Vespa tenant partition key — sub-partitions documents within an environment by team/org.
  # Default: "default" (single-tenant deployments).
  # e.g. --set veronex.vespaTenantId=team-a
  vespaTenantId: "default"

  otel:
    # gRPC endpoint (e.g. http://otel-collector:4317)
    endpoint: ""
    # HTTP endpoint — auto-derived from endpoint if unset
    httpEndpoint: ""

  service:
    type: ClusterIP
    port: 3000

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

  logLevel: "info"  # RUST_LOG level: error, warn, info, debug, trace

  # Extra environment variables (key: value)
  env: {}

veronexAnalytics:
  image:
    repository: gitea.girok.dev/beegy-labs/veronex-analytics
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1

  service:
    type: ClusterIP
    port: 3003

  logLevel: "info"  # RUST_LOG level: error, warn, info, debug, trace

  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

  env: {}

veronexConsumer:
  image:
    repository: gitea.girok.dev/beegy-labs/veronex-consumer
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1

  logLevel: "info"  # RUST_LOG level

  # Kafka/Redpanda auth — matches otelCollector.kafka pattern
  kafka:
    securityProtocol: PLAINTEXT   # PLAINTEXT | SASL_PLAINTEXT | SASL_SSL
    saslMechanism: "SCRAM-SHA-512"
    saslUsername: ""
    saslPassword: ""

  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 64Mi

  env: {}

veronexAgent:
  enabled: true
  image:
    repository: gitea.girok.dev/beegy-labs/veronex-agent
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  # Scrape interval in milliseconds. Thermal protection runs inside the agent,
  # so 60s is sufficient for metric collection.
  scrapeIntervalMs: "60000"
  healthPort: 9091
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  env: {}

veronexWeb:
  image:
    repository: gitea.girok.dev/beegy-labs/veronex-web
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1

  service:
    type: ClusterIP
    port: 3000

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  env: {}

veronexMcp:
  enabled: false
  image:
    repository: gitea.girok.dev/beegy-labs/veronex-mcp
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1

  service:
    type: ClusterIP
    port: 8080

  # Open-Meteo API call limit per hour (across all instances, enforced via Valkey)
  apiRateLimit: 200

  # Moka L1 cache max entries per instance
  l1MaxEntries: 10000

  # Valkey connection pool size per instance
  valkeyPool: 4

  # analyze_image tool — veronex gateway URL + API key
  veronexUrl: ""      # e.g. http://veronex:3000
  veronexApiKey: ""   # API key with inference access

  # web_search tool — SearXNG instance URL
  searxngUrl: ""      # e.g. http://searxng:8080

  logLevel: "info"

  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    # Set keda=true to use KEDA ScaledObject instead of HPA.
    # Requires KEDA operator installed in the cluster.
    keda: false
    kedaPrometheus:
      enabled: false
      serverAddress: "http://prometheus:9090"
      # Scale up when requests/sec exceeds this threshold per replica
      threshold: "100"

  env: {}

# ── Subcharts — enable/disable each independently ──────────────────────────────
# When a subchart is disabled, set the corresponding external* values.

postgresql:
  enabled: true
  auth:
    username: veronex
    password: ""  # REQUIRED — override in production
    database: veronex

externalPostgresql:
  host: ""
  port: 5432
  username: ""
  password: ""
  database: ""

valkey:
  enabled: true
  auth:
    enabled: false

externalValkey:
  host: ""
  port: 6379
  password: ""  # Optional — leave empty for no auth
  db: 0         # Valkey DB index (0-15)

clickhouse:
  enabled: true
  auth:
    username: veronex
    password: ""  # REQUIRED — override in production
    database: veronex

externalClickhouse:
  host: ""
  port: 8123
  username: ""
  password: ""
  database: ""

minio:
  enabled: true
  auth:
    rootUser: veronex
    rootPassword: ""  # REQUIRED — override in production
  defaultBuckets: "veronex-messages,veronex-images"
  imageBucket: "veronex-images"

externalMinio:
  endpoint: ""
  accessKey: ""
  secretKey: ""
  bucket: "veronex-messages"
  imageBucket: "veronex-images"
  region: "us-east-1"

# Redpanda chart uses strict schema — 'enabled' must be top-level to avoid validation error.
redpandaEnabled: true

externalRedpanda:
  brokers: ""

# ── OTel Collector (optional) ──────────────────────────────────────────────────

otelCollector:
  enabled: true
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.123.0"
    pullPolicy: IfNotPresent

  # Kafka/Redpanda auth — set securityProtocol to SASL_PLAINTEXT or SASL_SSL for external Kafka
  kafka:
    securityProtocol: PLAINTEXT   # PLAINTEXT | SASL_PLAINTEXT | SASL_SSL
    saslMechanism: ""             # SCRAM-SHA-512 | SCRAM-SHA-256 | PLAIN
    saslUsername: ""
    saslPassword: ""

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  service:
    type: ClusterIP

# ── Vespa (Vector SSOT) ──────────────────────────────────────────────────────
# Single-node Vespa for MCP tool vector selection (ANN search).
# Scale: content node 추가로 수평 확장 가능.

vespa:
  enabled: false
  image:
    repository: vespaengine/vespa
    tag: "8"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
  persistence:
    size: 10Gi
    storageClass: ""   # "" = cluster default (Longhorn 권장)
  # Internal service URL — used by veronex pods
  # Override if deploying Vespa outside this chart.
  url: ""   # default: http://<release>-vespa:8080

# ── Embedding service (for MCP vector selection with Vespa) ──────────────────
# Deployed automatically when vespa.enabled=true.
# Override embed.url to use an external embedding service instead.

veronexEmbed:
  image:
    repository: gitea.girok.dev/beegy-labs/veronex-embed
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1

  service:
    type: ClusterIP
    port: 3200

  logLevel: "info"

  resources:
    requests:
      cpu: 100m
      memory: 512Mi   # multilingual-e5-large ONNX ~280MB + runtime overhead
    limits:
      cpu: "1"
      memory: 1Gi

  env: {}

embed:
  url: ""  # override to use external embed service; default: http://<release>-veronex-embed:3200

# ── Database Migrations ──────────────────────────────────────────────────────
# Runs as pre-install,pre-upgrade Helm hook.
# helm install/upgrade triggers migrations automatically.

migrations:
  enabled: true
  clickhouse:
    retentionMetricsDays: 14
    retentionLogsDays: 7
    retentionInferenceDays: 90
    retentionAuditDays: 90
    retentionTracesDays: 7
    retentionMcpDays: 90

# ── ServiceAccount ───────────────────────────────────────────────────────────

serviceAccount:
  create: true
  name: ""
  annotations: {}

# ── External Secrets ─────────────────────────────────────────────────────────
# Use one of these to inject secrets from an external provider (Vault, AWS SM, etc.)
# When enabled, the chart-managed Secret is NOT created — the external provider manages it.

externalSecrets:
  # Option 1: External Secrets Operator (ESO)
  # Creates an ExternalSecret resource that syncs to a K8s Secret.
  eso:
    enabled: false
    # SecretStore or ClusterSecretStore reference
    secretStoreRef:
      name: ""
      kind: SecretStore  # or ClusterSecretStore
    # Remote key mappings (provider-specific paths)
    remoteRefs:
      jwtSecret: ""            # e.g. "veronex/jwt-secret"
      analyticsSecret: ""      # e.g. "veronex/analytics-secret"
      databaseUrl: ""          # e.g. "veronex/database-url"
      s3AccessKey: ""          # e.g. "veronex/s3-access-key"
      s3SecretKey: ""          # e.g. "veronex/s3-secret-key"
      geminiApiKey: ""         # e.g. "veronex/gemini-api-key" (optional)
      encryptionKey: ""        # e.g. "veronex/encryption-key" (optional)
    refreshInterval: "1h"

  # Option 2: CSI Secrets Store Driver
  # Mounts secrets as files; pods read from mounted volume.
  csi:
    enabled: false
    provider: ""  # vault, aws, azure, gcp
    # SecretProviderClass name — must be pre-created
    secretProviderClassName: ""
    # Create a K8s Secret from the CSI-mounted secrets (for env var usage)
    syncAsSecret: true

  # Option 3: Pre-existing Secret
  # Use a Secret that already exists in the namespace (managed externally).
  existingSecretName: ""

# ── Autoscaling ──────────────────────────────────────────────────────────────

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75

  # KEDA-based autoscaling (overrides HPA when enabled).
  # Scales on Valkey queue depth instead of CPU — reacts to actual workload.
  keda:
    enabled: false
    pollingInterval: 15     # seconds between metric checks
    cooldownPeriod: 120     # seconds to wait before scale-down
    # Valkey key: veronex:stats:jobs:pending (atomic counter)
    pendingJobsThreshold: "5"   # scale up when pending > this value

# ── PodDisruptionBudget ──────────────────────────────────────────────────────

podDisruptionBudget:
  enabled: false
  minAvailable: 1

# ── Ingress (optional) ─────────────────────────────────────────────────────────

ingress:
  enabled: false
  className: nginx
  host: veronex.example.com
  tls:
    enabled: false
    secretName: ""
