{{- if .Values.otelCollector.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-otel-collector
  labels:
    {{- include "veronex.labels" . | nindent 4 }}
    {{- include "veronex.otel.selectorLabels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "veronex.otel.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "veronex.labels" . | nindent 8 }}
        {{- include "veronex.otel.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default (printf "%s-veronex" .Release.Name) }}
      {{- end }}
      containers:
        - name: otel-collector
          image: "{{ .Values.otelCollector.image.repository }}:{{ .Values.otelCollector.image.tag }}"
          imagePullPolicy: {{ .Values.otelCollector.image.pullPolicy }}
          args:
            - "--config=/etc/otel/config.yaml"
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: health
              containerPort: 13133
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: KAFKA_SECURITY_PROTOCOL
              value: {{ .Values.otelCollector.kafka.securityProtocol | default "PLAINTEXT" | quote }}
            - name: KAFKA_SASL_MECHANISM
              value: {{ .Values.otelCollector.kafka.saslMechanism | default "" | quote }}
            - name: KAFKA_USERNAME
              value: {{ .Values.otelCollector.kafka.saslUsername | default "" | quote }}
            - name: KAFKA_PASSWORD
              value: {{ .Values.otelCollector.kafka.saslPassword | default "" | quote }}
          volumeMounts:
            - name: config
              mountPath: /etc/otel
              readOnly: true
          resources:
            {{- toYaml .Values.otelCollector.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-otel-collector-config
{{- end }}
