{{- if .Values.veronexAgent.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-veronex-agent
  labels:
    {{- include "veronex.labels" . | nindent 4 }}
    app.kubernetes.io/name: veronex-agent
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: agent
spec:
  type: ClusterIP
  clusterIP: None  # Headless — each pod is directly addressable
  selector:
    app.kubernetes.io/name: veronex-agent
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: agent
  ports:
    - name: http
      port: {{ .Values.veronexAgent.port }}
      targetPort: http
      protocol: TCP
{{- end }}
