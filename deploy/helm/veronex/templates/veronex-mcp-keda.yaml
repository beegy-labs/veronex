{{- if and .Values.veronexMcp.enabled .Values.veronexMcp.autoscaling.enabled .Values.veronexMcp.autoscaling.keda }}
{{- /* KEDA ScaledObject — requires KEDA operator installed in the cluster.
     Scales veronex-mcp based on HTTP request rate (via KEDA HTTP add-on)
     or Prometheus metrics. Set veronexMcp.autoscaling.keda=true to enable.
     Mutually exclusive with HPA (veronex-mcp-hpa.yaml). */}}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ .Release.Name }}-veronex-mcp
  labels:
    {{- include "veronex.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: {{ .Release.Name }}-veronex-mcp
  minReplicaCount: {{ .Values.veronexMcp.autoscaling.minReplicas }}
  maxReplicaCount: {{ .Values.veronexMcp.autoscaling.maxReplicas }}
  pollingInterval: 15
  cooldownPeriod: 60
  triggers:
    {{- if .Values.veronexMcp.autoscaling.kedaPrometheus.enabled }}
    - type: prometheus
      metadata:
        serverAddress: {{ .Values.veronexMcp.autoscaling.kedaPrometheus.serverAddress | quote }}
        metricName: veronex_mcp_requests_total
        query: |
          sum(rate(veronex_mcp_requests_total[1m]))
        threshold: {{ .Values.veronexMcp.autoscaling.kedaPrometheus.threshold | default "100" | quote }}
    {{- else }}
    - type: cpu
      metricType: Utilization
      metadata:
        value: {{ .Values.veronexMcp.autoscaling.targetCPUUtilizationPercentage | quote }}
    {{- end }}
{{- end }}
