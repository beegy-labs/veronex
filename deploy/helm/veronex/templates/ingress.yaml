{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  labels:
    {{- include "veronex.labels" . | nindent 4 }}
  {{- if .Values.ingress.className }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      {{- if .Values.ingress.tls.secretName }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
      {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # veronex API
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-veronex
                port:
                  name: http
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-veronex
                port:
                  name: http
          - path: /health
            pathType: Exact
            backend:
              service:
                name: {{ .Release.Name }}-veronex
                port:
                  name: http
          # veronex-web (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-veronex-web
                port:
                  name: http
{{- end }}
