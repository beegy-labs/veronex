{{- if and .Values.clickhouse.enabled .Values.clickhouseInit.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-clickhouse-schema
  labels:
    {{- include "veronex.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  schema.sql: |
    {{- .Files.Get "files/clickhouse-schema.sql" | nindent 4 }}
{{- end }}
