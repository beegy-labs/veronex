{{- if and .Values.clickhouse.enabled .Values.clickhouseInit.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-clickhouse-init
  labels:
    {{- include "veronex.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "veronex.labels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: clickhouse-init
          image: {{ .Values.clickhouseInit.image }}
          command:
            - /bin/sh
            - -c
            - |
              clickhouse-client \
                --host {{ .Release.Name }}-clickhouse \
                --user {{ include "veronex.clickhouseUser" . }} \
                --password {{ include "veronex.clickhousePassword" . }} \
                --database {{ include "veronex.clickhouseDb" . }} \
                --multiquery < /schema/schema.sql
          volumeMounts:
            - name: schema
              mountPath: /schema
              readOnly: true
      volumes:
        - name: schema
          configMap:
            name: {{ .Release.Name }}-clickhouse-schema
{{- end }}
