{{/*
Only create the chart-managed Secret when:
  - No ESO ExternalSecret is configured
  - No CSI SecretProviderClass is configured
  - No pre-existing secret name is provided
*/}}
{{- if and (not .Values.externalSecrets.eso.enabled) (not .Values.externalSecrets.csi.enabled) (not .Values.externalSecrets.existingSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-veronex-secrets
  labels:
    {{- include "veronex.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ required "veronex.jwt.secret is required (or use externalSecrets)" .Values.veronex.jwt.secret | quote }}
  ANALYTICS_SECRET: {{ required "veronex.analytics.secret is required (or use externalSecrets)" .Values.veronex.analytics.secret | quote }}
  DATABASE_URL: {{ include "veronex.postgresUrl" . | quote }}
  S3_ACCESS_KEY: {{ include "veronex.s3AccessKey" . | quote }}
  S3_SECRET_KEY: {{ include "veronex.s3SecretKey" . | quote }}
  {{- if .Values.veronex.geminiApiKey }}
  GEMINI_API_KEY: {{ .Values.veronex.geminiApiKey | quote }}
  {{- end }}
  GEMINI_ENCRYPTION_KEY: {{ required "veronex.encryption.key is required (or use externalSecrets)" .Values.veronex.encryption.key | quote }}
  {{- if or .Values.clickhouse.enabled .Values.externalClickhouse.host }}
  CLICKHOUSE_USER: {{ include "veronex.clickhouseUser" . | quote }}
  CLICKHOUSE_PASSWORD: {{ include "veronex.clickhousePassword" . | quote }}
  {{- end }}
  {{- if .Values.veronexMcp.veronexApiKey }}
  VERONEX_API_KEY: {{ .Values.veronexMcp.veronexApiKey | quote }}
  {{- end }}
  KAFKA_USERNAME: {{ .Values.veronexConsumer.kafka.saslUsername | default "" | quote }}
  KAFKA_PASSWORD: {{ .Values.veronexConsumer.kafka.saslPassword | default "" | quote }}
{{- end }}
