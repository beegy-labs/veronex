apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-veronex-web
  labels:
    {{- include "veronex.labels" . | nindent 4 }}
    {{- include "veronex.web.selectorLabels" . | nindent 4 }}
spec:
  type: {{ .Values.veronexWeb.service.type }}
  selector:
    {{- include "veronex.web.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.veronexWeb.service.port }}
      targetPort: http
      protocol: TCP
