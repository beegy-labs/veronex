{{- if .Values.externalSecrets.csi.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Release.Name }}-veronex-secrets
  labels:
    {{- include "veronex.labels" . | nindent 4 }}
spec:
  provider: {{ required "externalSecrets.csi.provider is required" .Values.externalSecrets.csi.provider }}
  {{- if .Values.externalSecrets.csi.syncAsSecret }}
  secretObjects:
    - secretName: {{ .Release.Name }}-veronex-secrets
      type: Opaque
      data:
        - objectName: jwt-secret
          key: JWT_SECRET
        - objectName: analytics-secret
          key: ANALYTICS_SECRET
        - objectName: database-url
          key: DATABASE_URL
        - objectName: s3-access-key
          key: S3_ACCESS_KEY
        - objectName: s3-secret-key
          key: S3_SECRET_KEY
        - objectName: encryption-key
          key: GEMINI_ENCRYPTION_KEY
        {{- if .Values.veronex.geminiApiKey }}
        - objectName: gemini-api-key
          key: GEMINI_API_KEY
        {{- end }}
        - objectName: kafka-username
          key: KAFKA_USERNAME
        - objectName: kafka-password
          key: KAFKA_PASSWORD
        {{- if or .Values.clickhouse.enabled .Values.externalClickhouse.host }}
        - objectName: clickhouse-password
          key: CLICKHOUSE_PASSWORD
        - objectName: clickhouse-user
          key: CLICKHOUSE_USER
        {{- end }}
        {{- if .Values.veronexMcp.veronexApiKey }}
        - objectName: veronex-api-key
          key: VERONEX_API_KEY
        {{- end }}
        {{- if .Values.veronex.bootstrapSuperPass }}
        - objectName: bootstrap-super-pass
          key: BOOTSTRAP_SUPER_PASS
        {{- end }}
  {{- end }}
  parameters:
    objects: |
      - objectName: "jwt-secret"
        objectType: "secret"
      - objectName: "analytics-secret"
        objectType: "secret"
      - objectName: "database-url"
        objectType: "secret"
      - objectName: "s3-access-key"
        objectType: "secret"
      - objectName: "s3-secret-key"
        objectType: "secret"
      - objectName: "encryption-key"
        objectType: "secret"
      {{- if .Values.veronex.geminiApiKey }}
      - objectName: "gemini-api-key"
        objectType: "secret"
      {{- end }}
      - objectName: "kafka-username"
        objectType: "secret"
      - objectName: "kafka-password"
        objectType: "secret"
      {{- if or .Values.clickhouse.enabled .Values.externalClickhouse.host }}
      - objectName: "clickhouse-password"
        objectType: "secret"
      - objectName: "clickhouse-user"
        objectType: "secret"
      {{- end }}
      {{- if .Values.veronexMcp.veronexApiKey }}
      - objectName: "veronex-api-key"
        objectType: "secret"
      {{- end }}
      {{- if .Values.veronex.bootstrapSuperPass }}
      - objectName: "bootstrap-super-pass"
        objectType: "secret"
      {{- end }}
{{- end }}
