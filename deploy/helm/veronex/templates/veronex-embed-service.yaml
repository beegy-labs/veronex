{{- if and (or .Values.vespa.enabled .Values.vespa.url) (not .Values.embed.url) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-veronex-embed
  labels:
    {{- include "veronex.labels" . | nindent 4 }}
    app.kubernetes.io/component: veronex-embed
spec:
  type: {{ .Values.veronexEmbed.service.type }}
  selector:
    app.kubernetes.io/component: veronex-embed
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.veronexEmbed.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
