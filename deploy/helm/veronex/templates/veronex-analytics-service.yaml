apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-veronex-analytics
  labels:
    {{- include "veronex.labels" . | nindent 4 }}
    {{- include "veronex.analytics.selectorLabels" . | nindent 4 }}
spec:
  type: {{ .Values.veronexAnalytics.service.type }}
  selector:
    {{- include "veronex.analytics.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.veronexAnalytics.service.port }}
      targetPort: http
      protocol: TCP
