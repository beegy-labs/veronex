{{- if and .Values.autoscaling.enabled (not .Values.autoscaling.keda.enabled) }}
{{- /* HPA targets the main API only (CPU-based fallback when KEDA is not enabled).
     Analytics and Agent are single-instance by design:
     analytics is a lightweight aggregator; agent is a StatefulSet with node affinity.
     When autoscaling.keda.enabled=true, use veronex-keda.yaml instead (mutually exclusive). */}}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-veronex
  labels:
    {{- include "veronex.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-veronex
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
