{{- if .Values.veronexAgent.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-veronex-agent
  labels:
    {{- include "veronex.labels" . | nindent 4 }}
    {{- include "veronex.agent.selectorLabels" . | nindent 4 }}
spec:
  serviceName: {{ .Release.Name }}-veronex-agent
  replicas: {{ .Values.veronexAgent.replicaCount }}
  selector:
    matchLabels:
      {{- include "veronex.agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "veronex.labels" . | nindent 8 }}
        {{- include "veronex.agent.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default (printf "%s-veronex" .Release.Name) }}
      {{- end }}
      containers:
        - name: veronex-agent
          image: "{{ .Values.veronexAgent.image.repository }}:{{ .Values.veronexAgent.image.tag }}"
          imagePullPolicy: {{ .Values.veronexAgent.image.pullPolicy }}
          env:
            - name: VERONEX_API_URL
              value: "http://{{ .Release.Name }}-veronex:{{ .Values.veronex.service.port }}"
            - name: OTEL_HTTP_ENDPOINT
              value: {{ include "veronex.otelHttpEndpoint" . | quote }}
            - name: SCRAPE_INTERVAL_MS
              value: {{ .Values.veronexAgent.scrapeIntervalMs | quote }}
            - name: REPLICA_COUNT
              value: {{ .Values.veronexAgent.replicaCount | quote }}
            - name: HEALTH_PORT
              value: {{ .Values.veronexAgent.healthPort | quote }}
            - name: RUST_LOG
              value: "info"
            - name: VALKEY_URL
              value: {{ include "veronex.valkeyUrl" . | quote }}
            {{- range $k, $v := .Values.veronexAgent.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          ports:
            - name: health
              containerPort: {{ .Values.veronexAgent.healthPort }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /startup
              port: health
            failureThreshold: 12
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            periodSeconds: 15
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: health
            periodSeconds: 30
            failureThreshold: 3
          resources:
            {{- toYaml .Values.veronexAgent.resources | nindent 12 }}
{{- end }}
