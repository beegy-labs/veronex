{{- if .Values.externalSecrets.eso.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-veronex-secrets
  labels:
    {{- include "veronex.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.eso.refreshInterval }}
  secretStoreRef:
    name: {{ required "externalSecrets.eso.secretStoreRef.name is required" .Values.externalSecrets.eso.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.eso.secretStoreRef.kind }}
  target:
    name: {{ .Release.Name }}-veronex-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: {{ required "externalSecrets.eso.remoteRefs.jwtSecret is required" .Values.externalSecrets.eso.remoteRefs.jwtSecret }}
    - secretKey: ANALYTICS_SECRET
      remoteRef:
        key: {{ required "externalSecrets.eso.remoteRefs.analyticsSecret is required" .Values.externalSecrets.eso.remoteRefs.analyticsSecret }}
    - secretKey: DATABASE_URL
      remoteRef:
        key: {{ required "externalSecrets.eso.remoteRefs.databaseUrl is required" .Values.externalSecrets.eso.remoteRefs.databaseUrl }}
    - secretKey: S3_ACCESS_KEY
      remoteRef:
        key: {{ required "externalSecrets.eso.remoteRefs.s3AccessKey is required" .Values.externalSecrets.eso.remoteRefs.s3AccessKey }}
    - secretKey: S3_SECRET_KEY
      remoteRef:
        key: {{ required "externalSecrets.eso.remoteRefs.s3SecretKey is required" .Values.externalSecrets.eso.remoteRefs.s3SecretKey }}
    {{- if .Values.externalSecrets.eso.remoteRefs.geminiApiKey }}
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.eso.remoteRefs.geminiApiKey }}
    {{- end }}
    {{- if .Values.externalSecrets.eso.remoteRefs.encryptionKey }}
    - secretKey: GEMINI_ENCRYPTION_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.eso.remoteRefs.encryptionKey }}
    {{- end }}
{{- end }}
