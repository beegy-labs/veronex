{{- if and .Values.veronexMcp.enabled .Values.veronexMcp.autoscaling.enabled (not .Values.veronexMcp.autoscaling.keda) }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-veronex-mcp
  labels:
    {{- include "veronex.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-veronex-mcp
  minReplicas: {{ .Values.veronexMcp.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.veronexMcp.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.veronexMcp.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
