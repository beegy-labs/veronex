{{- if .Values.veronexMcp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-veronex-mcp
  labels:
    {{- include "veronex.labels" . | nindent 4 }}
    {{- include "veronex.veronexMcp.selectorLabels" . | nindent 4 }}
spec:
  type: {{ .Values.veronexMcp.service.type }}
  selector:
    {{- include "veronex.veronexMcp.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.veronexMcp.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
