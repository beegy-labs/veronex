{{- if .Values.migrations.enabled }}
{{- $chHost := ternary (printf "%s-clickhouse" .Release.Name) .Values.externalClickhouse.host .Values.clickhouse.enabled }}
---
# ── PostgreSQL init ───────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-migrate-postgres
  labels:
    {{- include "veronex.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "veronex.labels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: postgres:18-alpine
          command: ["/bin/sh", "-c"]
          args:
            - psql "$(DATABASE_URL)?sslmode=disable" -f /migrations/init.sql
          env:
            - name: DATABASE_URL
              value: {{ include "veronex.postgresUrl" . | quote }}
          volumeMounts:
            - name: migrations
              mountPath: /migrations
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: migrations
          configMap:
            name: {{ .Release.Name }}-migrate-postgres-sql
---
# ── ClickHouse init ───────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-migrate-clickhouse
  labels:
    {{- include "veronex.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "veronex.labels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: clickhouse/clickhouse-server:26.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              sed \
                -e "s/__RETENTION_METRICS_DAYS__/{{ .Values.migrations.clickhouse.retentionMetricsDays }}/g" \
                -e "s/__RETENTION_LOGS_DAYS__/{{ .Values.migrations.clickhouse.retentionLogsDays }}/g" \
                -e "s/__RETENTION_INFERENCE_DAYS__/{{ .Values.migrations.clickhouse.retentionInferenceDays }}/g" \
                -e "s/__RETENTION_AUDIT_DAYS__/{{ .Values.migrations.clickhouse.retentionAuditDays }}/g" \
                -e "s/__RETENTION_TRACES_DAYS__/{{ .Values.migrations.clickhouse.retentionTracesDays }}/g" \
                -e "s/__RETENTION_MCP_DAYS__/{{ .Values.migrations.clickhouse.retentionMcpDays | default 90 }}/g" \
                /schema/schema.sql \
              | clickhouse-client \
                  --host={{ $chHost }} \
                  --port=9000 \
                  --user="$CLICKHOUSE_USER" \
                  --password="$CLICKHOUSE_PASSWORD" \
                  --database="$CLICKHOUSE_DB" \
                  --multiquery
          env:
            {{- $secretName := .Values.externalSecrets.existingSecretName | default (printf "%s-veronex-secrets" .Release.Name) }}
            {{- if or .Values.externalSecrets.eso.enabled .Values.externalSecrets.csi.enabled .Values.externalSecrets.existingSecretName }}
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: CLICKHOUSE_USER
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: CLICKHOUSE_PASSWORD
            {{- else }}
            - name: CLICKHOUSE_USER
              value: {{ include "veronex.clickhouseUser" . | quote }}
            - name: CLICKHOUSE_PASSWORD
              value: {{ include "veronex.clickhousePassword" . | quote }}
            {{- end }}
            - name: CLICKHOUSE_DB
              value: {{ include "veronex.clickhouseDb" . | quote }}
          volumeMounts:
            - name: schema
              mountPath: /schema
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: schema
          configMap:
            name: {{ .Release.Name }}-migrate-clickhouse-sql
{{- end }}
