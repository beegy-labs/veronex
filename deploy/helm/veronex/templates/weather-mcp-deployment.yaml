{{- if .Values.weatherMcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-weather-mcp
  labels:
    {{- include "veronex.labels" . | nindent 4 }}
    {{- include "veronex.weatherMcp.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.weatherMcp.replicaCount }}
  selector:
    matchLabels:
      {{- include "veronex.weatherMcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "veronex.labels" . | nindent 8 }}
        {{- include "veronex.weatherMcp.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: weather-mcp
          image: "{{ .Values.weatherMcp.image.repository }}:{{ .Values.weatherMcp.image.tag }}"
          imagePullPolicy: {{ .Values.weatherMcp.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.weatherMcp.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          env:
            - name: PORT
              value: "{{ .Values.weatherMcp.service.port }}"
            - name: VALKEY_URL
              value: {{ include "veronex.valkeyUrl" . | quote }}
            {{- if .Values.weatherMcp.apiRateLimit }}
            - name: WEATHER_API_RATE_LIMIT
              value: {{ .Values.weatherMcp.apiRateLimit | quote }}
            {{- end }}
            {{- if .Values.weatherMcp.l1MaxEntries }}
            - name: WEATHER_L1_MAX_ENTRIES
              value: {{ .Values.weatherMcp.l1MaxEntries | quote }}
            {{- end }}
            {{- if .Values.weatherMcp.valkeyPool }}
            - name: WEATHER_VALKEY_POOL
              value: {{ .Values.weatherMcp.valkeyPool | quote }}
            {{- end }}
            - name: RUST_LOG
              value: {{ .Values.weatherMcp.logLevel | default "info" | quote }}
            {{- range $k, $v := .Values.weatherMcp.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.weatherMcp.resources | nindent 12 }}
{{- end }}
