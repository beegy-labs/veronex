apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-veronex-consumer
  labels:
    {{- include "veronex.labels" . | nindent 4 }}
    app.kubernetes.io/component: veronex-consumer
spec:
  replicas: {{ .Values.veronexConsumer.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: veronex-consumer
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "veronex.labels" . | nindent 8 }}
        app.kubernetes.io/component: veronex-consumer
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default (printf "%s-veronex" .Release.Name) }}
      {{- end }}
      containers:
        - name: veronex-consumer
          image: "{{ .Values.veronexConsumer.image.repository }}:{{ .Values.veronexConsumer.image.tag }}"
          imagePullPolicy: {{ .Values.veronexConsumer.image.pullPolicy }}
          env:
            - name: RUST_LOG
              value: {{ .Values.veronexConsumer.logLevel | default "info" | quote }}
            - name: KAFKA_BROKER
              value: {{ include "veronex.redpandaBroker" . | quote }}
            - name: KAFKA_SECURITY_PROTOCOL
              value: {{ .Values.veronexConsumer.kafka.securityProtocol | default "PLAINTEXT" | quote }}
            - name: KAFKA_SASL_MECHANISM
              value: {{ .Values.veronexConsumer.kafka.saslMechanism | default "SCRAM-SHA-512" | quote }}
            {{- $secretName := include "veronex.secretName" . }}
            {{- if or .Values.externalSecrets.eso.enabled .Values.externalSecrets.csi.enabled .Values.externalSecrets.existingSecretName }}
            - name: KAFKA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: KAFKA_USERNAME
                  optional: true
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: KAFKA_PASSWORD
                  optional: true
            {{- else }}
            - name: KAFKA_USERNAME
              value: {{ .Values.veronexConsumer.kafka.saslUsername | default "" | quote }}
            - name: KAFKA_PASSWORD
              value: {{ .Values.veronexConsumer.kafka.saslPassword | default "" | quote }}
            {{- end }}
            - name: CLICKHOUSE_HTTP_URL
              value: {{ include "veronex.clickhouseUrl" . | quote }}
            {{- if or .Values.externalSecrets.eso.enabled .Values.externalSecrets.csi.enabled .Values.externalSecrets.existingSecretName }}
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: CLICKHOUSE_USER
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: CLICKHOUSE_PASSWORD
            {{- else }}
            - name: CLICKHOUSE_USER
              value: {{ include "veronex.clickhouseUser" . | quote }}
            - name: CLICKHOUSE_PASSWORD
              value: {{ include "veronex.clickhousePassword" . | quote }}
            {{- end }}
            - name: CLICKHOUSE_DB
              value: {{ include "veronex.clickhouseDb" . | quote }}
            {{- range $k, $v := .Values.veronexConsumer.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.veronexConsumer.resources | nindent 12 }}
