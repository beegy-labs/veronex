{{- if .Values.otelCollector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-otel-collector-config
  labels:
    {{- include "veronex.labels" . | nindent 4 }}
    {{- include "veronex.otel.selectorLabels" . | nindent 4 }}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1000

      # Filter: only forward metrics we care about to Kafka.
      # Agent pushes ALL node-exporter metrics raw — this is where we select.
      filter/metrics:
        metrics:
          include:
            match_type: regexp
            metric_names:
              # System
              - node_memory_MemTotal_bytes
              - node_memory_MemAvailable_bytes
              - node_cpu_seconds_total
              # GPU (DRM + hwmon)
              - node_drm_.*
              - node_hwmon_temp_celsius
              - node_hwmon_power_average_watt.*
              - node_hwmon_chip_names
              # Ollama
              - ollama_.*

    exporters:
      kafka/logs:
        brokers:
          - {{ include "veronex.redpandaBroker" . }}
        topic: otel-logs
        encoding: otlp_proto
      kafka/metrics:
        brokers:
          - {{ include "veronex.redpandaBroker" . }}
        topic: otel-metrics
        encoding: otlp_proto
      kafka/traces:
        brokers:
          - {{ include "veronex.redpandaBroker" . }}
        topic: otel-traces
        encoding: otlp_proto

    service:
      pipelines:
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [kafka/logs]
        metrics:
          receivers: [otlp]
          processors: [filter/metrics, batch]
          exporters: [kafka/metrics]
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [kafka/traces]
{{- end }}
