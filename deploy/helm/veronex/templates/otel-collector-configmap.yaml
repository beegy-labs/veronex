{{- if .Values.otelCollector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-otel-collector-config
  labels:
    {{- include "veronex.labels" . | nindent 4 }}
    {{- include "veronex.otel.selectorLabels" . | nindent 4 }}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1000

    exporters:
      kafka/logs:
        brokers:
          - {{ required "OTel collector requires a Redpanda/Kafka broker: set redpandaEnabled=true or externalRedpanda.brokers" (include "veronex.redpandaBroker" .) }}
        topic: otel-logs
        encoding: otlp_json
        {{- if ne (.Values.otelCollector.kafka.securityProtocol | default "PLAINTEXT") "PLAINTEXT" }}
        auth:
          sasl:
            username: ${KAFKA_USERNAME}
            password: ${KAFKA_PASSWORD}
            mechanism: ${KAFKA_SASL_MECHANISM}
        {{- end }}
      kafka/metrics:
        brokers:
          - {{ required "OTel collector requires a Redpanda/Kafka broker: set redpandaEnabled=true or externalRedpanda.brokers" (include "veronex.redpandaBroker" .) }}
        topic: otel-metrics
        encoding: otlp_json
        {{- if ne (.Values.otelCollector.kafka.securityProtocol | default "PLAINTEXT") "PLAINTEXT" }}
        auth:
          sasl:
            username: ${KAFKA_USERNAME}
            password: ${KAFKA_PASSWORD}
            mechanism: ${KAFKA_SASL_MECHANISM}
        {{- end }}
      kafka/traces:
        brokers:
          - {{ required "OTel collector requires a Redpanda/Kafka broker: set redpandaEnabled=true or externalRedpanda.brokers" (include "veronex.redpandaBroker" .) }}
        topic: otel-traces
        encoding: otlp_json
        {{- if ne (.Values.otelCollector.kafka.securityProtocol | default "PLAINTEXT") "PLAINTEXT" }}
        auth:
          sasl:
            username: ${KAFKA_USERNAME}
            password: ${KAFKA_PASSWORD}
            mechanism: ${KAFKA_SASL_MECHANISM}
        {{- end }}

    service:
      pipelines:
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [kafka/logs]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [kafka/metrics]
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [kafka/traces]
{{- end }}
