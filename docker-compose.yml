# Copy .env.example to .env and fill in required values before running
name: veronex

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: veronex
      POSTGRES_USER: ${POSTGRES_USER:-veronex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-veronex}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-veronex} -d veronex"]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:9.0.3-alpine
    platform: linux/amd64
    command:
      - valkey-server
      - --save
      - "60 1"
      - --appendonly
      - "yes"
      - --databases
      - "16"
    ports:
      - "6380:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:26.1
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: veronex
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-veronex}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-veronex}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      # Data retention — applies on first volume creation only.
      # To change TTL on an existing volume: ALTER TABLE ... MODIFY TTL ...
      CLICKHOUSE_RETENTION_METRICS_DAYS: ${CLICKHOUSE_RETENTION_METRICS_DAYS:-14}
      CLICKHOUSE_RETENTION_LOGS_DAYS: ${CLICKHOUSE_RETENTION_LOGS_DAYS:-7}
      CLICKHOUSE_RETENTION_INFERENCE_DAYS: ${CLICKHOUSE_RETENTION_INFERENCE_DAYS:-90}
      CLICKHOUSE_RETENTION_AUDIT_DAYS: ${CLICKHOUSE_RETENTION_AUDIT_DAYS:-90}
      CLICKHOUSE_RETENTION_TRACES_DAYS: ${CLICKHOUSE_RETENTION_TRACES_DAYS:-7}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    ports:
      - "9010:9000"   # S3 API
      - "9011:9001"   # Web console (http://localhost:9011)
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-veronex}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-veronex123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/minio:latest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}
        mc mb --ignore-existing local/veronex-messages
        mc mb --ignore-existing local/veronex-images
        mc anonymous set download local/veronex-images
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-veronex}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-veronex123}
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"

  veronex:
    build:
      context: .
      dockerfile: crates/veronex/Dockerfile
    ports:
      - "3001:3000"
    volumes:
      # AMD GPU sysfs (read-only). On Linux hosts this exposes hardware counters
      # to the gpu_metrics collector. On macOS/Docker Desktop this path does not
      # exist and the collector will log a single debug message then do nothing.
      - /sys/class/drm:/sys/class/drm:ro
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-veronex}:${POSTGRES_PASSWORD:-veronex}@postgres:5432/veronex
      # DB index /0 — must match the queue/rate-limit keys in veronex
      VALKEY_URL: redis://valkey:6379/0
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required - copy .env.example to .env}
      ANALYTICS_URL: http://veronex-analytics:3003
      ANALYTICS_SECRET: ${ANALYTICS_SECRET:-veronex-analytics-internal-secret}
      BOOTSTRAP_SUPER_USER: ${BOOTSTRAP_SUPER_USER-}
      BOOTSTRAP_SUPER_PASS: ${BOOTSTRAP_SUPER_PASS-}
      GEMINI_ENCRYPTION_KEY: ${GEMINI_ENCRYPTION_KEY:-22551e8092edc3243163385e0dc6157ead33f14f14b1dbc794f0a00bb51886ae}
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      RUST_LOG: info
      # Login rate limit per IP per 5-min window. Set to 0 to disable (e.g. E2E tests).
      LOGIN_RATE_LIMIT: "${LOGIN_RATE_LIMIT:-10}"
      # OTel distributed tracing — optional, uncomment to enable.
      # OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      # Capacity analyzer Ollama URL — defaults to OLLAMA_URL when unset.
      # CAPACITY_ANALYZER_OLLAMA_URL: http://host.docker.internal:11434
      # S3 / MinIO — conversation context object storage
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-veronex}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-veronex123}
      S3_BUCKET: veronex-messages
      S3_IMAGE_BUCKET: veronex-images
      S3_IMAGE_PUBLIC_URL: http://localhost:9010/veronex-images
      S3_REGION: us-east-1
      VESPA_URL: http://vespa:8080
      VESPA_ENVIRONMENT: ${VESPA_ENVIRONMENT:-local-dev}
      VESPA_TENANT_ID: ${VESPA_TENANT_ID:-default}
      VALKEY_KEY_PREFIX: ${VALKEY_KEY_PREFIX:-}
      EMBED_URL: http://veronex-embed:3200
      KAFKA_BROKER: redpanda:9092
      CLICKHOUSE_HTTP_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-veronex}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-veronex}
      CLICKHOUSE_DB: veronex
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
      vespa-init:
        condition: service_completed_successfully

  veronex-analytics:
    build:
      context: .
      dockerfile: crates/veronex-analytics/Dockerfile
    expose:
      - "3003"
    environment:
      PORT: "3003"
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-veronex}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-veronex}
      CLICKHOUSE_DB: veronex
      OTEL_HTTP_ENDPOINT: http://otel-collector:4318
      ANALYTICS_SECRET: ${ANALYTICS_SECRET:-veronex-analytics-internal-secret}
      RUST_LOG: info
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      clickhouse:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    restart: unless-stopped

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.3.9
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
      - --set
      - redpanda.data_directory=/var/lib/redpanda/data
    ports:
      - "9092:9092"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  otel-collector:
    build:
      context: ./docker/otel
      dockerfile: Dockerfile
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./docker/otel/config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "13133:13133" # health_check
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:13133"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  veronex-mcp:
    build:
      context: .
      dockerfile: crates/veronex-mcp/Dockerfile
    environment:
      PORT: "3100"
      RUST_LOG: info
      # DB index /1 — separate from veronex's queue/rate-limit keys (index /0)
      VALKEY_URL: redis://valkey:6379/1
      SEARXNG_URL: ${SEARXNG_URL:-https://ai-search.girok.dev}
      # analyze_image tool — route through Veronex gateway instead of calling Ollama directly
      VERONEX_URL: http://veronex:3000
      VERONEX_API_KEY: ${VERONEX_API_KEY:-}
      ANALYZE_IMAGE_MODEL: ${ANALYZE_IMAGE_MODEL:-qwen3-vl:8b}
    ports:
      - "3100:3100"
    depends_on:
      valkey:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  veronex-embed:
    build:
      context: .
      dockerfile: crates/veronex-embed/Dockerfile
    environment:
      PORT: "3200"
      RUST_LOG: info
    ports:
      - "3200:3200"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3200/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  veronex-agent:
    build:
      context: .
      dockerfile: crates/veronex-agent/Dockerfile
    environment:
      VERONEX_API_URL: http://veronex:3000
      OTEL_HTTP_ENDPOINT: http://otel-collector:4318
      SCRAPE_INTERVAL_MS: "${SCRAPE_INTERVAL_MS:-60000}"
      REPLICA_COUNT: "1"
      HEALTH_PORT: "9091"
      RUST_LOG: info
      VALKEY_URL: redis://valkey:6379/0
      DATABASE_URL: postgres://${POSTGRES_USER:-veronex}:${POSTGRES_PASSWORD:-veronex}@postgres:5432/veronex
      EMBED_URL: http://veronex-embed:3200
      # MCP server list is fetched dynamically from /v1/mcp/targets each scrape cycle.
    ports:
      - "9091:9091"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9091/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      veronex:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
      veronex-embed:
        condition: service_healthy
      veronex-mcp:
        condition: service_healthy
    restart: unless-stopped

  veronex-web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_VERONEX_API_URL: http://localhost:3001
        NEXT_PUBLIC_VERONEX_ADMIN_KEY: ${NEXT_PUBLIC_VERONEX_ADMIN_KEY:-veronex-bootstrap-admin-key}
    ports:
      - "3000:3000"
    environment:
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_VERONEX_API_URL: http://localhost:3001
      NEXT_PUBLIC_VERONEX_ADMIN_KEY: ${NEXT_PUBLIC_VERONEX_ADMIN_KEY:-veronex-bootstrap-admin-key}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      veronex:
        condition: service_healthy

  veronex-consumer:
    build:
      context: .
      dockerfile: crates/veronex-consumer/Dockerfile
    environment:
      KAFKA_BROKER: redpanda:9092
      KAFKA_SECURITY_PROTOCOL: PLAINTEXT
      CLICKHOUSE_HTTP_URL: http://clickhouse:8123
      CLICKHOUSE_DB: veronex
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-veronex}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-veronex}
      RUST_LOG: info
    depends_on:
      redpanda:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  vespa:
    image: vespaengine/vespa:8
    hostname: vespa
    ports:
      - "8080:8080"   # query + feed API
      - "19071:19071" # config server
    volumes:
      - vespa_data:/opt/vespa/var
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:19071/ApplicationStatus || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s
    restart: unless-stopped

  # One-shot: deploy mcp_tools schema to Vespa config server.
  # Runs after Vespa is healthy. veronex waits for this before starting.
  vespa-init:
    image: alpine:3
    volumes:
      - ./docker/vespa/app:/vespa-app:ro
      - ./docker/vespa/deploy.sh:/deploy.sh:ro
    environment:
      VESPA_CONFIG_URL: http://vespa:19071
    depends_on:
      vespa:
        condition: service_healthy
    command: ["sh", "-c", "apk add --no-cache curl zip > /dev/null && sh /deploy.sh"]
    restart: "no"

volumes:
  postgres_data:
  valkey_data:
  clickhouse_data:
  redpanda_data:
  minio_data:
  vespa_data:
