services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: veronex
      POSTGRES_USER: veronex
      POSTGRES_PASSWORD: veronex
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veronex -d veronex"]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    platform: linux/amd64
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:26.2
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: veronex
      CLICKHOUSE_USER: veronex
      CLICKHOUSE_PASSWORD: veronex
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  veronex:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    volumes:
      # AMD GPU sysfs (read-only). On Linux hosts this exposes hardware counters
      # to the gpu_metrics collector. On macOS/Docker Desktop this path does not
      # exist and the collector will log a single debug message then do nothing.
      - /sys/class/drm:/sys/class/drm:ro
    environment:
      DATABASE_URL: postgres://veronex:veronex@postgres:5432/veronex
      VALKEY_URL: redis://valkey:6379
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: veronex
      CLICKHOUSE_PASSWORD: veronex
      CLICKHOUSE_DB: veronex
      CLICKHOUSE_ENABLED: "true"
      OLLAMA_URL: http://host.docker.internal:11434
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      BOOTSTRAP_API_KEY: ${BOOTSTRAP_API_KEY:-veronex-bootstrap-admin-key}
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  otel-collector:
    build:
      context: ./docker/otel
      dockerfile: Dockerfile
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./docker/otel/config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "13133:13133" # health_check
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:13133"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      clickhouse:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      veronex:
        condition: service_started
    restart: unless-stopped

  veronex-web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_VERONEX_API_URL: http://localhost:3001
        NEXT_PUBLIC_VERONEX_ADMIN_KEY: ${BOOTSTRAP_API_KEY:-veronex-bootstrap-admin-key}
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_VERONEX_API_URL: http://localhost:3001
      NEXT_PUBLIC_VERONEX_ADMIN_KEY: ${BOOTSTRAP_API_KEY:-veronex-bootstrap-admin-key}
    depends_on:
      - veronex

volumes:
  postgres_data:
  clickhouse_data:
