# Build performance: mold linker + split debuginfo
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = [
    "-C", "link-arg=-fuse-ld=mold",
    "-C", "split-debuginfo=unpacked",
]

# Sparse registry protocol (faster crate index)
[registries.crates-io]
protocol = "sparse"

