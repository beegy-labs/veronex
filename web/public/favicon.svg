<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background (not skewed) -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!--
    Letters pivoted at canvas centre (16,16) then skewX(-12°) for italic lean.
    Pre-skew layout:  i glow left≈3.7  →  Q+arrow right≈29  →  span≈25.3px
    Centre of span ≈ 16.35  ≈  canvas centre 16  ✓
  -->
  <g transform="translate(16,16) skewX(-12) translate(-16,-16)">
    <!-- i · dot glow halo -->
    <circle cx="7.5" cy="5.5" r="3.8" fill="white" opacity="0.22"/>
    <!-- i · dot -->
    <circle cx="7.5" cy="5.5" r="2.3" fill="white" filter="url(#glow)"/>
    <!-- i · stem -->
    <rect x="5.75" y="9.5" width="3.5" height="17.5" rx="1.75" fill="white"/>

    <!-- Q · ring -->
    <circle cx="20.5" cy="16.5" r="7.5" stroke="white" stroke-width="2.5"/>
    <!-- Q · inner activation node -->
    <circle cx="20.5" cy="16.5" r="1.6"  fill="white" opacity="0.55"/>
    <!-- Q · tail (queue exit direction) -->
    <line x1="25.5" y1="22.2" x2="28"   y2="26"
          stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Q · arrowhead chevron -->
    <polyline points="26.3,24.3 28,26 26.7,27.7"
              stroke="white" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
